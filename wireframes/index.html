<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cubs App — UI Wireframes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; padding: 40px 20px; }
    h1 { font-size: 1.6rem; color: #aaa; letter-spacing: 0.05em; text-transform: uppercase; }
    .grid { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    a { display: block; background: #1e1e2e; border: 1px solid #333; border-radius: 12px; padding: 24px 32px; text-decoration: none; color: #fff; text-align: center; width: 260px; transition: all 0.2s; }
    a:hover { border-color: #4488ff; transform: translateY(-2px); }
    a .num { font-size: 2.5rem; font-weight: 700; color: #4488ff; }
    a .title { font-size: 1rem; font-weight: 600; margin-top: 8px; }
    a .sub { font-size: 0.8rem; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Cubs Win Checker — UI Options</h1>
  <div class="grid">
    <a href="option1.html">
      <div class="num">1</div>
      <div class="title">Stadium Scoreboard</div>
      <div class="sub">Dark · High-Contrast · Sports Dashboard</div>
    </a>
    <a href="option2.html">
      <div class="num">2</div>
      <div class="title">Front Office Analytics</div>
      <div class="sub">Clean · Data-Forward · SaaS Dashboard</div>
    </a>
    <a href="option3.html">
      <div class="num">3</div>
      <div class="title">Cubs Beat Reporter</div>
      <div class="sub">Editorial · Newspaper · Longform</div>
    </a>
  </div>
</body>
</html>
